<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Dashboard</title>
    <link rel="stylesheet" href="CRM.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="info-box box_1">
        <article class="info-card active" data-detail="Groups track collaboration, membership, and active workflows.">
          <h2>Groups</h2>
          <div class="icon-row">
            <span class="icon">☐</span>
            <span class="icon">👥</span>
            <span class="icon">📈</span>
          </div>
        </article>
      </div>

      <div class="info-box box_2">
        <article class="info-card" data-detail="Leaderboard shows top performers and score momentum for each group.">
          <h2>Leaderboard</h2>
          <div class="icon-row">
            <span class="icon">☐</span>
            <span class="icon">👥</span>
            <span class="icon">📈</span>
          </div>
        </article>
      </div>

      <div class="info-box box_3">
        <article class="info-card" data-detail="Failure metrics highlight risk areas with clear next-step actions.">
          <h2>Failures :)</h2>
          <div class="icon-row">
            <span class="icon">⚠️</span>
            <span class="icon">👥</span>
            <span class="icon">📊</span>
          </div>
        </article>
      </div>
    </div>

    <script src="CRM.js"></script>
  </body>
</html>
